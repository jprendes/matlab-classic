<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Classic MATLAB</title>
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                padding: 8px;
                box-sizing: border-box;
                background: #444;
            }
            .window {
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 8px 30px rgb(0 0 0 / 50%);
                max-width: 100%;
            }
            body.compact {
                padding: 0;
                background: black;
            }
            body.compact .window {
                border-radius: 0;
                box-shadow: none;
                min-width: 100vw;
                min-height: 100vh;
            }
            .titlebar {
                display: flex;
                align-items: center;
                height: 36px;
                padding: 0 12px;
                background: #2d2d2d;
                user-select: none;
            }
            .titlebar-buttons {
                display: flex;
                gap: 8px;
            }
            .titlebar-buttons span {
                width: 12px;
                height: 12px;
                border-radius: 50%;
            }
            .titlebar-buttons .close { background: #ff5f57; }
            .titlebar-buttons .minimize { background: #ffbd2e; }
            .titlebar-buttons .maximize { background: #28c840; }
            .titlebar-title {
                flex: 1;
                text-align: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 13px;
                color: #999;
                margin-right: 56px;
            }
            #terminal {
                background: black;
                padding: 8px;
            }

            /* width */
            #terminal .xterm-viewport::-webkit-scrollbar {
                width: 6px;
            }

            /* Track */
            #terminal .xterm-viewport::-webkit-scrollbar-track {
                background: transparent;
            }

            /* Handle */
            #terminal .xterm-viewport::-webkit-scrollbar-thumb {
                background: #888;
            }

            /* Handle on hover */
            #terminal .xterm-viewport::-webkit-scrollbar-thumb:hover {
                background: #BBB;
            }

            #terminal .xterm-viewport {
                scrollbar-width: thin;
                scrollbar-color: #888 transparent;
            }
            #terminal {
                position: relative;
            }
            .restart-btn {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 8px 20px;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 14px;
                color: #fff;
                background: #555;
                border: 1px solid #888;
                border-radius: 6px;
                cursor: pointer;
                z-index: 10;
            }
            .restart-btn:hover {
                background: #777;
            }
        </style>
    </head>
    <body>
        <div class="window">
            <div class="titlebar">
                <div class="titlebar-buttons">
                    <span class="close"></span>
                    <span class="minimize"></span>
                    <span class="maximize"></span>
                </div>
                <div class="titlebar-title">Classic MATLAB</div>
            </div>
            <div id="terminal"></div>
        </div>
        <script src="./coi-serviceworker.js"></script>
        <script type="module">
            import MATLAB from "./src/client.mjs";
            MATLAB.fromElement(document.getElementById('terminal'));
        </script>
    </body>
</html>
