<!DOCTYPE html>
<html>
    <head>
        <title>MATLAB Classic</title>
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-width: max-content;
                min-height: 100vh;
                margin: 0;
                padding: 8px;
                box-sizing: border-box;
                background: #666;
            }
            #terminal {
                background: black;
                padding: 8px;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgb(0 0 0 / 50%);
            }

            /* width */
            #terminal ::-webkit-scrollbar {
                width: 10px;
            }

            /* Track */
            #terminal ::-webkit-scrollbar-track {
                background: transparent;
            }

            /* Handle */
            #terminal ::-webkit-scrollbar-thumb {
                background: #888;
            }

            /* Handle on hover */
            #terminal ::-webkit-scrollbar-thumb:hover {
                background: #BBB;
            }

            #terminal {
                scrollbar-width: thin;
                scrollbar-color: #888 transparent;
            }
        </style>
    </head>
    <body>
        <div id="terminal"></div>
        <script type="module">
            import MATLAB from "./src/client.mjs";
            MATLAB.fromElement(document.getElementById('terminal'));
        </script>
    </body>
</html>
